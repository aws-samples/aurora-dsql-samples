# Spring Boot Aurora DSQL Configuration
spring.application.name=aurora-dsql-demo

# Server Configuration
server.port=8080

# Aurora DSQL Configuration
# Replace <your-dsql-endpoint> with your actual DSQL cluster endpoint
# The Aurora DSQL JDBC Connector handles IAM auth, token refresh, and SSL automatically
spring.datasource.url=jdbc:aws-dsql:postgresql://<your-dsql-endpoint>
spring.datasource.username=admin
spring.datasource.driver-class-name=software.amazon.dsql.jdbc.DSQLConnector

# HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# AWS Region (optional if set in ~/.aws/config or running on AWS)
spring.cloud.aws.region.static=us-east-1

# Logging
logging.level.com.example.dsql=INFO
logging.level.software.amazon.awssdk=WARN
logging.level.com.zaxxer.hikari=INFO
