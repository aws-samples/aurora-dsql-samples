# Spring Boot Aurora DSQL Configuration
spring.application.name=aurora-dsql-demo

# Aurora DSQL Configuration
# The Aurora DSQL JDBC Connector handles IAM auth, token refresh, and SSL automatically
spring.datasource.url=jdbc:aws-dsql:postgresql://${CLUSTER_ENDPOINT}
spring.datasource.username=${CLUSTER_USER}
spring.datasource.driver-class-name=software.amazon.dsql.jdbc.DSQLConnector

# HikariCP Configuration (aligned with Aurora DSQL preferred example)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=3300000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# AWS Region (optional if set in ~/.aws/config or running on AWS)
spring.cloud.aws.region.static=${REGION:us-east-1}

# Logging
logging.level.com.example.dsql=INFO
logging.level.software.amazon.awssdk=WARN
logging.level.com.zaxxer.hikari=INFO
