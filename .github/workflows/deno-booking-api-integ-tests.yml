name: Deno Booking API integration tests

permissions: {}

on:
  workflow_call: {}
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'deno/booking-api/postgres-js/**'
      - '.github/workflows/deno-booking-api-integ-tests.yml'

jobs:
  create-cluster:
    uses: ./.github/workflows/dsql-cluster-create.yml
    with:
      workflow_name: deno-booking-api
    secrets:
      AWS_IAM_ROLE: ${{ secrets.JAVASCRIPT_IAM_ROLE }}
    permissions:
      id-token: write # required by aws-actions/configure-aws-credentials

  booking-api-integ-test:
    needs: create-cluster
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required by aws-actions/configure-aws-credentials

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.JAVASCRIPT_IAM_ROLE }}
          aws-region: ${{ needs.create-cluster.outputs.region }}

      - name: Run Deno integration tests
        working-directory: ./deno/booking-api/postgres-js
        env:
          CLUSTER_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
          CLUSTER_USER: 'admin'
        run: deno task test

  delete-cluster:
    if: always() && needs.create-cluster.result == 'success'
    needs: [create-cluster, booking-api-integ-test]
    uses: ./.github/workflows/dsql-cluster-delete.yml
    with:
      cluster-id: ${{ needs.create-cluster.outputs.cluster-id }}
      region: ${{ needs.create-cluster.outputs.region }}
    secrets:
      AWS_IAM_ROLE: ${{ secrets.JAVASCRIPT_IAM_ROLE }}
    permissions:
      id-token: write # required by aws-actions/configure-aws-credentials
