name: TypeScript Prisma integration tests

permissions: {}

on:
  workflow_call: {}
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Check formatting
        working-directory: ./typescript/prisma-multi-region
        run: |
          npm ci
          npm run format:check

  create-cluster:
    uses: ./.github/workflows/dsql-cluster-create.yml
    with:
      workflow_name: typescript-prisma
    secrets:
      AWS_IAM_ROLE: ${{ secrets.TYPESCRIPT_IAM_ROLE }}
    permissions:
      id-token: write # required by aws-actions/configure-aws-credentials

  prisma-integ-test:
    needs: create-cluster
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required by aws-actions/configure-aws-credentials

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.TYPESCRIPT_IAM_ROLE }}
          aws-region: ${{ needs.create-cluster.outputs.region }}

      - name: Download DSQL certificate
        run: |
          mkdir -p ~/.postgresql
          wget https://www.amazontrust.com/repository/AmazonRootCA1.pem -O ~/.postgresql/root.crt

      - name: Install dependencies
        working-directory: ./typescript/prisma-multi-region
        run: |
          npm ci

      - name: Install dsql-lint
        run: |
          cargo install dsql-lint

      - name: Build project
        working-directory: ./typescript/prisma-multi-region
        env:
          CLUSTER_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
        run: |
          npm run build

      - name: Validate schema for DSQL compatibility
        working-directory: ./typescript/prisma-multi-region
        run: |
          npm run validate

      - name: Create psql auth helper
        run: |
          cat > /tmp/configure-psql.sh << 'EOF'
          configure_psql() {
            local user=$1

            if [ "$user" = "admin" ]; then
              local auth_type="admin-auth"
            else
              local auth_type="auth"
            fi

            export PGHOST=$CLUSTER_ENDPOINT
            export PGPASSWORD=$(aws dsql generate-db-connect-${auth_type}-token --region $REGION --hostname $PGHOST --expires-in 300)
            export PGUSER=$user
            export PGDATABASE="postgres"
            export PGSSLMODE="verify-full"
          }
          EOF

      - name: Run migrations as admin
        working-directory: ./typescript/prisma-multi-region
        env:
          CLUSTER_USER: "admin"
          CLUSTER_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
        run: |
          # Ensure clean state first.
          npm run prisma:migrate-down || true

          npm run prisma:migrate-up

      - name: Test incremental migration workflow
        working-directory: ./typescript/prisma-multi-region
        env:
          CLUSTER_USER: "admin"
          CLUSTER_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
          REGION: ${{ needs.create-cluster.outputs.region }}
        run: |
          source /tmp/configure-psql.sh
          configure_psql $CLUSTER_USER

          # Add a new column to the Order model (after the status field)
          sed -i '/status.*String.*@default("pending")/a\  notes     String?' prisma/schema.prisma

          # Show the change
          grep -A2 "status" prisma/schema.prisma

          # Validate the modified schema first
          npm run validate

          # Generate incremental migration using --from-config-datasource (reads from prisma.config.ts)
          # Prisma may generate DROP CONSTRAINT for unchanged PKs when diffing against a live DB.
          # DSQL doesn't support DROP CONSTRAINT, so we filter those out before transforming.
          npx prisma migrate diff --from-config-datasource --to-schema prisma/schema.prisma --script \
            | grep -v 'DROP CONSTRAINT' \
            > /tmp/raw_migration.sql

          npx aurora-dsql-prisma transform /tmp/raw_migration.sql -o prisma/migrations/1_add_notes/migration.sql

          # Show what was generated
          cat prisma/migrations/1_add_notes/migration.sql

          # Apply the incremental migration via prisma migrate deploy
          npm run prisma:migrate-up

          # Verify the column was added
          psql -c "SELECT column_name FROM information_schema.columns WHERE table_name = 'orders' AND column_name = 'notes'" | grep -q notes

          # Clean up: revert schema and remove incremental migration folder
          git checkout prisma/schema.prisma
          rm -rf prisma/migrations/1_add_notes

      - name: Run integration tests as admin
        working-directory: ./typescript/prisma-multi-region
        env:
          CLUSTER_USER: "admin"
          CLUSTER_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
        run: |
          npm test

      - name: Clean admin schema
        working-directory: ./typescript/prisma-multi-region
        env:
          CLUSTER_USER: "admin"
          CLUSTER_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
        run: |
          npm run prisma:migrate-down

      - name: Create non-admin role
        working-directory: ./typescript/prisma-multi-region
        env:
          ADMIN_USER: "admin"
          NON_ADMIN_USER: "myuser"
          NON_ADMIN_SCHEMA: "myschema"
          CLUSTER_ROLE: ${{ secrets.TYPESCRIPT_IAM_ROLE }}
          CLUSTER_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
          REGION: ${{ needs.create-cluster.outputs.region }}
        run: |
          source /tmp/configure-psql.sh
          configure_psql $ADMIN_USER

          # Ensure clean state first.
          psql -c "REVOKE ALL PRIVILEGES ON SCHEMA \"$NON_ADMIN_SCHEMA\" FROM \"$NON_ADMIN_USER\"" || true
          psql -c "DROP SCHEMA IF EXISTS \"$NON_ADMIN_SCHEMA\" CASCADE"
          psql -c "AWS IAM REVOKE \"$NON_ADMIN_USER\" FROM '$CLUSTER_ROLE'" || true
          psql -c "DROP ROLE IF EXISTS \"$NON_ADMIN_USER\""

          psql -c "CREATE ROLE \"$NON_ADMIN_USER\" WITH LOGIN"
          psql -c "AWS IAM GRANT \"$NON_ADMIN_USER\" TO '$CLUSTER_ROLE'"
          psql -c "CREATE SCHEMA \"$NON_ADMIN_SCHEMA\""
          psql -c "GRANT ALL PRIVILEGES ON SCHEMA \"$NON_ADMIN_SCHEMA\" TO \"$NON_ADMIN_USER\""

      - name: Run migrations as non-admin
        working-directory: ./typescript/prisma-multi-region
        env:
          CLUSTER_USER: "myuser"
          CLUSTER_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
        run: |
          # Ensure clean state first.
          npm run prisma:migrate-down || true

          npm run prisma:migrate-up

      - name: Run integration tests as non-admin
        working-directory: ./typescript/prisma-multi-region
        env:
          CLUSTER_USER: "myuser"
          CLUSTER_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
        run: |
          npm test

      - name: Clean non-admin schema
        working-directory: ./typescript/prisma-multi-region
        env:
          CLUSTER_USER: "myuser"
          CLUSTER_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
        run: |
          npm run prisma:migrate-down

      - name: Clean non-admin role
        working-directory: ./typescript/prisma-multi-region
        env:
          ADMIN_USER: "admin"
          NON_ADMIN_USER: "myuser"
          NON_ADMIN_SCHEMA: "myschema"
          CLUSTER_ROLE: ${{ secrets.TYPESCRIPT_IAM_ROLE }}
          CLUSTER_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
          REGION: ${{ needs.create-cluster.outputs.region }}
        run: |
          source /tmp/configure-psql.sh
          configure_psql $ADMIN_USER

          psql -c "REVOKE ALL PRIVILEGES ON SCHEMA \"$NON_ADMIN_SCHEMA\" FROM \"$NON_ADMIN_USER\""
          psql -c "DROP SCHEMA \"$NON_ADMIN_SCHEMA\" CASCADE"
          psql -c "AWS IAM REVOKE \"$NON_ADMIN_USER\" FROM '$CLUSTER_ROLE'"
          psql -c "DROP ROLE \"$NON_ADMIN_USER\""

  delete-cluster:
    if: always() && needs.create-cluster.result == 'success'
    needs: [create-cluster, prisma-integ-test]
    uses: ./.github/workflows/dsql-cluster-delete.yml
    with:
      cluster-id: ${{ needs.create-cluster.outputs.cluster-id }}
      region: ${{ needs.create-cluster.outputs.region }}
    secrets:
      AWS_IAM_ROLE: ${{ secrets.TYPESCRIPT_IAM_ROLE }}
    permissions:
      id-token: write # required by aws-actions/configure-aws-credentials
