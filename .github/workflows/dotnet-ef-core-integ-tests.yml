name: Dotnet EF Core integration tests

permissions: {}

on:
  workflow_call: {}
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  create-cluster:
    uses: ./.github/workflows/dsql-cluster-create.yml
    with:
      workflow_name: dotnet-ef-core
    secrets:
      AWS_IAM_ROLE: ${{ secrets.DOTNET_IAM_ROLE }}
    permissions:
      id-token: write # required by aws-actions/configure-aws-credentials

  dotnet-ef-core-integ-test:
    needs: create-cluster
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required by aws-actions/configure-aws-credentials

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.DOTNET_IAM_ROLE }}
        aws-region: ${{ needs.create-cluster.outputs.region }}

    - name: Configure and run integration for EF Core
      working-directory: ./dotnet/ef-core/examples/InventoryApi.IntegrationTests
      env:
        CLUSTER_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
        REGION: ${{ needs.create-cluster.outputs.region }}
      run: |
        dotnet test

  delete-cluster:
    if: always() && needs.create-cluster.result == 'success'
    needs: [create-cluster, dotnet-ef-core-integ-test]
    uses: ./.github/workflows/dsql-cluster-delete.yml
    with:
      cluster-id: ${{ needs.create-cluster.outputs.cluster-id }}
      region: ${{ needs.create-cluster.outputs.region }}
    secrets:
      AWS_IAM_ROLE: ${{ secrets.DOTNET_IAM_ROLE }}
    permissions:
      id-token: write # required by aws-actions/configure-aws-credentials
